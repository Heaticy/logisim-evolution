name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  JDK_VERSION: "21"
  JDK_DISTRO: "temurin"

jobs:
  build_linux:
    name: Build Linux Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JDK_VERSION }}
          distribution: ${{ env.JDK_DISTRO }}

      - name: Build jar and deb
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew shadowJar createDeb

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-artifacts
          path: |
            build/libs/*-all.jar
            build/dist/*.deb

  build_windows:
    name: Build Windows Artifacts
    runs-on: windows-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JDK_VERSION }}
          distribution: ${{ env.JDK_DISTRO }}

      - name: Build msi
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew.bat createMsi

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifacts
          path: build/dist/*.msi

  build_macos:
    name: Build macOS Artifacts
    runs-on: macos-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Set up aarch64 JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JDK_VERSION }}
          distribution: ${{ env.JDK_DISTRO }}

      - name: Build aarch64 dmg and pkg
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew createDmg createPkg

      - name: Set up x86_64 JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JDK_VERSION }}
          distribution: ${{ env.JDK_DISTRO }}
          architecture: x64

      - name: Build x86_64 dmg and pkg
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew createDmg createPkg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-artifacts
          path: |
            build/dist/*.dmg
            build/dist/*.pkg

  publish_release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build_linux
      - build_windows
      - build_macos
    if: ${{ always() && (needs.build_linux.result == 'success' || needs.build_windows.result == 'success' || needs.build_macos.result == 'success') }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Show release files
        run: find release-artifacts -type f | sort

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
          prerelease: false
